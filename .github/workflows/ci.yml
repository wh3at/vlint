# vlint continuous integration (unit U6).
#
# Secret-free, least-privilege quality and browser-acceptance pipeline for
# pull requests and pushes to the default branch. Every job holds
# contents:read only; no job uses a release environment or a write token.
# Third-party actions are pinned to immutable commit SHAs, never mutable tags.
#
# Browser trust model (KTD5, implementation constraints):
#   - No job restores a browser cache produced by a different trust domain.
#     There is no actions/cache for the Playwright payload and no
#     PLAYWRIGHT_BROWSERS_PATH / PLAYWRIGHT_DOWNLOAD_HOST override anywhere
#     in this workflow.
#   - The browser-test job installs exact Chromium OS prerequisites (the same
#     package list as tests/release/Containerfile) and invokes the compiled
#     binary's `browser install` once.
#   - Integration and acceptance then consume that same verified managed cache;
#     release validation independently exercises a clean disposable guest.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref; never block a newer push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs inherit this and never widen.
permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  # ---------------------------------------------------------------------------
  # Secret-free quality gates (no browser execution).
  # ---------------------------------------------------------------------------

  typecheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  architecture:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run check:architecture

  unit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  # ---------------------------------------------------------------------------
  # Production compile — gates all downstream jobs on a binary built from
  # typechecked, architecture-clean source.
  # ---------------------------------------------------------------------------

  build:
    needs: [typecheck, architecture, unit]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Compile production binary
        run: bun run build:linux-x64
      - name: Verify compiled binary reports version
        run: ./dist/vlint-linux-x64 --version
      - name: Upload production binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vlint-linux-x64
          path: dist/vlint-linux-x64
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Browser integration and acceptance gate.
  #
  # One job installs the pinned browser once, then runs both source-level
  # integration tests and compiled-binary acceptance tests against that exact
  # managed cache. No browser cache crosses a job or trust boundary.
  # ---------------------------------------------------------------------------

  browser-tests:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Install Chromium system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            fonts-liberation \
            libasound2t64 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libatspi2.0-0t64 \
            libcairo2 \
            libcups2t64 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0t64 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libx11-6 \
            libxcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2
      - name: Download production binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vlint-linux-x64
          path: dist
      - name: Restore executable mode
        run: chmod +x dist/vlint-linux-x64
      - name: Install and verify pinned browser
        run: ./dist/vlint-linux-x64 browser install
      - name: Run integration tests
        run: bun run test:integration
      - name: Run compiled CLI acceptance tests
        run: bun run test:acceptance

  # ---------------------------------------------------------------------------
  # Standalone release validation (Docker-based clean Ubuntu 24.04 guest).
  # Self-contained: builds, stages the archive + SHA256SUMS, and runs the full
  # release validator inside a disposable guest. Gated on build so a broken
  # compile does not waste Docker resources.
  # ---------------------------------------------------------------------------

  release-validate:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Validate release in clean Ubuntu 24.04 guest
        run: bun run release:validate
